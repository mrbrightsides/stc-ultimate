syntax = "proto3";

package stc.blockchain;

// ========================================
// STC ULTIMATE - BLOCKCHAIN EVENT STREAMING
// gRPC Protocol Buffer Definition
// ========================================

// Service definition for blockchain event streaming
service BlockchainEventService {
  // Server-side streaming: Subscribe to real-time blockchain events
  rpc StreamBlockchainEvents(StreamEventsRequest) returns (stream BlockchainEvent);
  
  // Unary: Get event statistics
  rpc GetEventStats(StatsRequest) returns (EventStats);
  
  // Unary: Get recent events (batch)
  rpc GetRecentEvents(RecentEventsRequest) returns (RecentEventsResponse);
}

// Request message for event streaming
message StreamEventsRequest {
  // Optional filters
  repeated string event_types = 1;  // Filter by event names (e.g., "PaymentProcessed")
  optional int32 service_id = 2;     // Filter by service ID
  optional string booking_id = 3;    // Filter by booking ID
  bool include_iot_actions = 4;      // Include IoT actions in stream
}

// Blockchain event message (streamed)
message BlockchainEvent {
  string id = 1;
  string tx_hash = 2;
  int32 block_number = 3;
  int64 timestamp = 4;
  string from = 5;
  string to = 6;
  string value = 7;
  string gas_used = 8;
  string gas_cost = 9;
  string status = 10;
  
  // Service details
  optional int32 service_id = 11;
  optional string service_name = 12;
  optional string booking_id = 13;
  
  // Events
  repeated ParsedEvent events = 14;
  repeated DecodedEvent decoded_events = 15;
  
  // IoT actions triggered
  repeated IoTAction iot_actions = 16;
}

// Parsed event from transaction logs
message ParsedEvent {
  string event_name = 1;
  string signature = 2;
  int32 log_index = 3;
  map<string, string> args = 4;
}

// Decoded event with ABI
message DecodedEvent {
  string event_name = 1;
  string signature = 2;
  int32 log_index = 3;
  map<string, string> args = 4;
  string category = 5;
  string severity = 6;
}

// IoT action triggered by blockchain event
message IoTAction {
  string action_id = 1;
  string device_id = 2;
  string device_name = 3;
  string device_type = 4;
  string action = 5;
  map<string, string> params = 6;
  int64 triggered_at = 7;
  string triggered_by = 8;
  string event_name = 9;
  string status = 10;
}

// Request for statistics
message StatsRequest {
  // Empty for now, can add filters later
}

// Event statistics response
message EventStats {
  int32 total_transactions = 1;
  int32 total_events = 2;
  int32 total_iot_actions = 3;
  string total_gas_used = 4;
  string avg_gas_per_tx = 5;
  int32 confirmed_transactions = 6;
  int32 failed_transactions = 7;
  int64 last_updated = 8;
}

// Request for recent events
message RecentEventsRequest {
  int32 count = 1;  // Number of recent events to fetch
}

// Response with recent events
message RecentEventsResponse {
  repeated BlockchainEvent events = 1;
  int32 total_count = 2;
}
